<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ↓↓↓ 浏览器标签页标题，改成你的名字 / Browser tab title -->
  <title>曹炜杰 Weijie (Jay) Cao · 数据分析师 / Data Analyst</title>
  <meta name="description" content="曹炜杰 Weijie (Jay) Cao — Data Analyst | 个人主页 / Personal homepage" />

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #e8f0fe;
      --border: #e5e9f0;
      --shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px 64px; }

    /* 顶部语言切换 */
    .topbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .lang-toggle {
      display: inline-flex; border: 1px solid var(--border);
      background: var(--card); border-radius: 999px; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .lang-toggle button {
      border: 0; background: transparent; cursor: pointer;
      padding: 8px 16px; font-size: 14px; color: var(--muted);
      font-weight: 600; transition: all .2s ease;
    }
    .lang-toggle button.active { background: var(--accent); color: #fff; }

    /* 个人卡片 */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 44px 36px; text-align: center; margin-bottom: 22px;
    }
    .avatar {
      width: 132px; height: 132px; border-radius: 50%;
      object-fit: cover; border: 4px solid #fff;
      box-shadow: 0 6px 20px rgba(37, 99, 235, .18);
      margin: 0 auto 20px; display: block; background: var(--accent-soft);
    }
    .hero h1 { font-size: 30px; letter-spacing: .5px; margin-bottom: 6px; }
    .hero .title { color: var(--accent); font-weight: 600; font-size: 17px; margin-bottom: 12px; }
    .hero .tagline { color: var(--muted); font-size: 16px; max-width: 560px; margin: 0 auto; }

    /* 按钮 */
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 26px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: 999px; font-size: 15px;
      font-weight: 600; text-decoration: none; cursor: pointer;
      border: 1px solid var(--border); transition: transform .15s ease, box-shadow .15s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-ghost { background: var(--card); color: var(--text); }
    .btn svg { width: 18px; height: 18px; }

    /* 内容区块 */
    .section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 30px 34px; margin-bottom: 22px;
    }
    .section h2 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--accent); margin-bottom: 16px; font-weight: 700;
    }
    .section p { color: #374151; font-size: 16px; white-space: pre-line; }

    /* 技能标签 */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      background: var(--accent-soft); color: var(--accent);
      padding: 7px 15px; border-radius: 999px; font-size: 14px; font-weight: 600;
    }

    /* 联系方式 */
    .links { display: flex; flex-wrap: wrap; gap: 14px; }
    .link-item {
      display: inline-flex; align-items: center; gap: 9px;
      color: var(--text); text-decoration: none; font-size: 15px;
      padding: 10px 16px; border: 1px solid var(--border);
      border-radius: 12px; transition: all .15s ease; background: #fcfdff;
    }
    .link-item:hover { border-color: var(--accent); color: var(--accent); }
    .link-item svg { width: 18px; height: 18px; }

    footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 36px; }

    [data-when-lang] { display: none; }

    @media (max-width: 560px) {
      .hero { padding: 34px 22px; }
      .section { padding: 24px 22px; }
      .hero h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="lang-toggle" role="group" aria-label="language">
        <button data-set-lang="zh">中文</button>
        <button data-set-lang="en">EN</button>
      </div>
    </div>

    <!-- 主卡片 -->
    <section class="hero">
      <img id="avatar" class="avatar" alt="头像 / portrait" />
      <h1 id="name"></h1>
      <div class="title" id="title"></div>
      <p class="tagline" id="tagline"></p>
      <div class="actions" id="actions"></div>
    </section>

    <!-- 自我介绍 -->
    <section class="section">
      <h2 data-when-lang="zh">自我介绍</h2>
      <h2 data-when-lang="en">About Me</h2>
      <p id="about"></p>
    </section>

    <!-- 技能 / 亮点（不需要可整段删掉） -->
    <section class="section" id="skills-section">
      <h2 data-when-lang="zh">技能 / 亮点</h2>
      <h2 data-when-lang="en">Skills / Highlights</h2>
      <div class="chips" id="skills"></div>
    </section>

    <!-- 联系方式 -->
    <section class="section">
      <h2 data-when-lang="zh">联系我</h2>
      <h2 data-when-lang="en">Contact</h2>
      <div class="links" id="links"></div>
    </section>

    <footer id="footer"></footer>
  </div>

  <script>
  /* =====================================================================
     ★★★ 只需修改下面这个 CONFIG，就能改好整个主页 ★★★
     ★★★ Just edit this CONFIG object to customize everything ★★★
     - zh = 中文内容，en = 英文内容
     - 照片：把照片命名为 profile.jpg 放进 assets/ 文件夹即可自动显示
     - 简历：把简历命名为 resume.pdf 放进 assets/ 文件夹即可
     ===================================================================== */
  const CONFIG = {
    name:    { zh: "曹炜杰",          en: "Weijie (Jay) Cao" },
    title:   { zh: "数据分析师",       en: "Data Analyst" },
    tagline: { zh: "把多源杂乱数据变成可靠的 SQL 管道、BI 看板与统计 / 机器学习模型，驱动业务决策。",
               en: "Turning messy multi-source data into reliable SQL pipelines, BI dashboards, and statistical / ML models that drive decisions." },

    about: {
      zh: "数学统计本科 + 金融数学与金融科技硕士（波士顿大学），已通过 FRM 一级，约 2 年美国数据分析全职经验。\n熟练用 SQL / Python / Looker Studio 构建数据管道与可视化看板，曾独立负责 5 家长期客户、每年交付约 40 个定制看板；并从 0 到 1 独立交付 2 个 production 级全栈 SaaS（员工保留预测系统、海归福利助手），熟练运用 Cursor、Claude Code 等 AI 辅助编程工具。\n期望在上海加入数据分析 / 数据科学团队。",
      en: "Data analyst with a B.A. in Mathematics & Statistics and an M.Sc. in Mathematical Finance & FinTech (Boston University), FRM Part I, and 2+ years of full-time experience across fintech, quant, and HR analytics.\nI build reliable SQL pipelines and BI dashboards (40+ custom Looker Studio dashboards a year) and have shipped two production full-stack SaaS apps from 0 to 1 with AI-assisted tools (Cursor, Claude Code).\nLooking to join a data analytics / data science team in Shanghai."
    },

    // 照片路径：把照片命名为 profile.jpg 放进 assets/ 即可自动显示；找不到时显示占位头像
    photo: "assets/profile.jpg",

    // 简历下载：中文版 / 英文版（主页按当前语言自动选择对应版本）
    resume: { zh: "assets/resume-zh.pdf", en: "assets/resume-en.pdf" },

    // 技能标签
    skills: {
      zh: ["SQL", "Python (Pandas / NumPy / scikit-learn)", "R", "Looker Studio / BI 看板",
           "机器学习 (XGBoost / 随机森林)", "时间序列 (ARIMA)", "A/B 检验", "NLP / SHAP",
           "AI 辅助开发 (Cursor / Claude Code)"],
      en: ["SQL", "Python (Pandas / NumPy / scikit-learn)", "R", "Looker Studio / BI",
           "Machine Learning (XGBoost / Random Forest)", "Time Series (ARIMA)", "A/B Testing",
           "NLP / SHAP", "AI-assisted Dev (Cursor / Claude Code)"]
    },

    // 联系方式 / 社交链接。type 决定图标：github / email / link / linkedin
    contacts: [
      { type: "github",   label: "GitHub",   url: "https://github.com/WeijieCao77" },
      { type: "linkedin", label: "LinkedIn", url: "https://www.linkedin.com/in/weijie-cao-bu" },
      { type: "email",    label: "Email",    url: "mailto:weijiecao77@gmail.com" }
    ]
  };
  /* ===================== CONFIG 到此结束 / END OF CONFIG ===================== */


  /* ----------- 以下为渲染逻辑，一般不需要改动 / rendering logic ----------- */
  const ICONS = {
    download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
    github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 4.7 18.3 5 18.3 5c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>',
    email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>',
    linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14C2.2 0 0 2.2 0 5v14c0 2.8 2.2 5 5 5h14c2.8 0 5-2.2 5-5V5c0-2.8-2.2-5-5-5zM7.1 20.5H3.6V9h3.5v11.5zM5.3 7.4a2 2 0 1 1 0-4.1 2 2 0 0 1 0 4.1zM20.5 20.5H17v-5.6c0-1.3 0-3-1.9-3s-2.1 1.4-2.1 2.9v5.7H9.5V9h3.3v1.6h.1c.5-.9 1.6-1.9 3.3-1.9 3.5 0 4.2 2.3 4.2 5.4v6.4z"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.5-1.5"/></svg>'
  };

  // 默认占位头像（找不到照片时显示）
  const PLACEHOLDER_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="132" height="132" viewBox="0 0 132 132">' +
    '<rect width="132" height="132" fill="#e8f0fe"/>' +
    '<circle cx="66" cy="52" r="26" fill="#9db8ee"/>' +
    '<path d="M22 120c0-24 20-40 44-40s44 16 44 40z" fill="#9db8ee"/></svg>'
  );

  let lang = (localStorage.getItem("homepage-lang")) ||
             (navigator.language && navigator.language.startsWith("en") ? "en" : "zh");

  function t(field) { return (field && (field[lang] ?? field.zh ?? "")) || ""; }

  function render() {
    document.documentElement.lang = (lang === "en") ? "en" : "zh-CN";

    // 头像
    const avatar = document.getElementById("avatar");
    avatar.src = CONFIG.photo;
    avatar.onerror = () => { avatar.onerror = null; avatar.src = PLACEHOLDER_AVATAR; };

    document.getElementById("name").textContent = t(CONFIG.name);
    document.getElementById("title").textContent = t(CONFIG.title);
    document.getElementById("tagline").textContent = t(CONFIG.tagline);
    document.getElementById("about").textContent = t(CONFIG.about);

    // 操作按钮：下载简历 + 第一个社交链接
    const resumeLabel = (lang === "en") ? "Download Resume" : "下载简历";
    const resumeHref = (typeof CONFIG.resume === "string") ? CONFIG.resume : t(CONFIG.resume);
    const actions = document.getElementById("actions");
    actions.innerHTML =
      '<a class="btn btn-primary" href="' + resumeHref + '" download>' +
      ICONS.download + '<span>' + resumeLabel + '</span></a>' +
      CONFIG.contacts.slice(0, 1).map(c =>
        '<a class="btn btn-ghost" href="' + c.url + '" target="_blank" rel="noopener">' +
        (ICONS[c.type] || ICONS.link) + '<span>' + c.label + '</span></a>'
      ).join("");

    // 技能
    const skills = t(CONFIG.skills) || [];
    const skillsBox = document.getElementById("skills");
    const skillsSection = document.getElementById("skills-section");
    if (Array.isArray(skills) && skills.length) {
      skillsBox.innerHTML = skills.map(s => '<span class="chip">' + s + '</span>').join("");
      skillsSection.style.display = "";
    } else {
      skillsSection.style.display = "none";
    }

    // 联系方式
    document.getElementById("links").innerHTML = CONFIG.contacts.map(c =>
      '<a class="link-item" href="' + c.url + '" target="_blank" rel="noopener">' +
      (ICONS[c.type] || ICONS.link) + '<span>' + c.label + '</span></a>'
    ).join("");

    // 语言相关的小标题
    document.querySelectorAll("[data-when-lang]").forEach(el => {
      el.style.display = (el.getAttribute("data-when-lang") === lang) ? "block" : "none";
    });

    // 切换按钮高亮
    document.querySelectorAll("[data-set-lang]").forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
    });

    const year = new Date().getFullYear();
    document.getElementById("footer").textContent =
      "© " + year + " " + t(CONFIG.name) + " · Built with GitHub Pages";
  }

  document.querySelectorAll("[data-set-lang]").forEach(btn => {
    btn.addEventListener("click", () => {
      lang = btn.getAttribute("data-set-lang");
      localStorage.setItem("homepage-lang", lang);
      render();
    });
  });

  render();
  </script>
</body>
</html>
